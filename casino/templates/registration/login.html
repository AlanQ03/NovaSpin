<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - NovaSpin</title>

    <link rel="stylesheet" href="{% static 'css/register.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="auth-container">

    <div class="auth-card">

        <img src="{% static 'images/NovaspinLogo.png' %}" class="logo">

        <h1 class="title">Welcome Back</h1>
        <p class="subtitle">Log in to continue playing</p>

        {% if form.errors %}
            <div class="error-box">
                Invalid username or password.
            </div>
        {% endif %}

        <form method="post" class="auth-form">
            {% csrf_token %}

            <label>Username</label>
            <input type="text" name="username" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit" class="auth-btn">Log In</button>
        </form>

        <p class="switch-text">
            Don’t have an account?
            <a href="{% url 'signup' %}">Sign up</a>
        </p>

    </div>

</div>

</body>
</html>
