<!DOCTYPE html>
{% load static %}
<html>
<head>
    <title>Login</title>
</head>
<body>
    <h1>Login</h1>

    {% if form.errors %}
        <p>Invalid username or password.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Log In</button>
    </form>

    <p>Don't Have an Account?</p>
    <a href="{% url 'signup' %}"> Sign Up Now! </a>
</body>
</html>
